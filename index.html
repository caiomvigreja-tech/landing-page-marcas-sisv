
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Marca e Patentes | Grupo SISV + Grupo SS</title>
    <meta name="description" content="Proteja o nome da sua empresa. Consultoria especializada em marcas, patentes e propriedade intelectual. Faça seu diagnóstico gratuito.">
    
    <!-- Google Fonts: Montserrat (Títulos) & Inter (Corpo) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Montserrat:wght@600;700;800&display=swap" rel="stylesheet">
    
    <!-- FontAwesome para Ícones -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Tailwind CSS (via CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Supabase JS Library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- Configuração de Cores Personalizadas -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            orange: '#FF6600', // Laranja SISV (Ação/Detalhes)
                            orangeDark: '#cc5200', // Hover do Laranja
                            dark: '#1A2B40',   // Azul Profundo (Autoridade)
                            gray: '#F4F6F8',   // Off-white (Fundo suave)
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        heading: ['Montserrat', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <style>
        /* Suavização de rolagem */
        html { scroll-behavior: smooth; }
        
        /* Animações e Transições do FAQ */
        .faq-content {
            transition: max-height 0.3s ease-out, opacity 0.3s ease-out;
            max-height: 0;
            opacity: 0;
            overflow: hidden;
        }
        .faq-content.active {
            max-height: 200px;
            opacity: 1;
        }
        .rotate-icon { transition: transform 0.3s ease; }
        .rotate-icon.active { transform: rotate(45deg); } 
        
        /* Animação suave de entrada (Hero) */
        .fade-in-up {
            animation: fadeInUp 0.8s ease-out forwards;
            opacity: 0;
            transform: translateY(20px);
        }
        @keyframes fadeInUp {
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
